apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: food-health-app-backend
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    spec:
      containers:
      - image: gcr.io/YOUR_PROJECT_ID/food-app-backend
        env:
        - name: POSTGRES_SERVER
          value: "your-cloud-sql-connection-name"
        - name: USE_SQLITE_FALLBACK
          value: "False"
        # Mount Cloud SQL proxy or add it natively depending on your VPC
        ports:
        - containerPort: 8000
